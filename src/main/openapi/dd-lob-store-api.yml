openapi: 3.0.1

servers:
  - url: http://localhost:20385/

info:
  description: Service for storing large objects in the Data Vault
  version: ${project.version}
  title: dd-lob-store-api
  contact:
    email: info@dans.knaw.nl
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html

paths:
  /:
    get:
      summary: Returns a description of the service.
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
                description: a plain text, human readable description of the service
                example: |
                  LOB Store Running (v${project.version})

  /transfers:
    post:
      operationId: addTransfer
      summary: Add a new transfer to the queue
      requestBody:
        description: Transfer request details
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '201':
          description: Transfer created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
        '400':
          description: Invalid request body
        '409':
          description: Transfer already in progress for the given SHA-1

  /transfers/{id}:
    get:
      operationId: getTransferStatus
      summary: Retrieve the status of a transfer
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the transfer
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferStatusInfo'
        '404':
          description: Transfer not found

  /location/{hash}:
    get:
      operationId: getLocationByHash
      summary: Retrieve the location of a file by its SHA-1 hash
      description: This only works for files that have been completely processed.
      parameters:
        - name: hash
          in: path
          required: true
          description: The SHA-1 hash of the file
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '404':
          description: Location not found for the given hash

components:
  schemas:
    TransferRequest:
      type: object
      properties:
        dataverseFileId:
          type: integer
          format: int64
          description: The Dataverse file ID to download (as a long)
        sha1Sum:
          type: string
          description: The SHA-1 hash of the file, used for verifying the integrity of the file after download
        datastation:
          type: string
          description: The name of the datastation where the file is located. This is used to determine which credentials to use for downloading the file.
      required:
        - dataverseFileId
        - sha1Sum
        - datastation

    TransferResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the transfer
      required:
        - id

    TransferStatusInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/TransferStatus'
      required:
        - id
        - status

    TransferStatus:
      type: string
      enum:
        - PENDING
        - INSPECTING
        - INSPECTED
        - DOWNLOADING
        - DOWNLOADED
        - PACKAGING
        - PACKAGED
        - TRANSFERRING
        - TRANSFERRED
        - VERIFYING
        - DONE
        - REJECTED
        - FAILED

    LocationResponse:
      type: object
      properties:
        location:
          type: string
          description: The storage location of the file
      required:
        - location
